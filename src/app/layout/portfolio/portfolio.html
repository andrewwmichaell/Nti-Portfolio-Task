<section class="portfolio-section">
  <div class="portfolio-container">
    <h1>
        Portfolio
    </h1>

    @if (isLoading) {
      <p class="status-message">Loading projects...</p>
    }

    @if (errorMessage) {
      <p class="status-message">{{ errorMessage }}</p>
    }

    <div class="projects-grid">
      @for (project of projects; track project._id) {
        <article class="project-card">
          <div class="card-body">
            <h3>{{ project.title }}</h3>
            <p>{{ project.description }}</p>
            <app-project-card
              [modalTitle]="project.title"
              [description]="project.description"
              [githubUrl]="project.githubUrl || '#'"
              [images]="getImages(project)"
            ></app-project-card>
          </div>
          <div class="tags">
            @for (tag of project.techTags || []; track tag) {
              <span class="tag" [ngClass]="getTagClass(tag)">{{ tag }}</span>
            }
          </div>
        </article>
      }
    </div>
  </div>
</section>
